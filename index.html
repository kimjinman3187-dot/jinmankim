        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif;

            inset: 0; 
            z-index: 9999; 
            background: linear-gradient(160deg, #0f2554 0%, #1e3a8a 100%); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
        }
        
        .login-card { 
            width: 100%;

            width: 13px; 
            height: 13px;

            background: #f1f5f9; 
        }
        
        .pin-dot.on {

            border-color: #1e3a8a; 
        }
        
        .keypad { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr);

        }
        
        .kp-btn { 
            padding: 14px; 
            background: #f8fafc; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 18px; 
            font-weight: 700; 
            cursor: pointer; 
        }
        
        .kp-btn:active { 
            transform: scale(0.92); 
            background: #dbeafe; 
        }
        
        .badge { 
            display: inline-block; 
            font-size: 9px; 
            font-weight: 700; 
            padding: 2px 8px; 
            border-radius: 20px; 
        }
        
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-approved { background: #dbeafe; color: #1d4ed8; }
        .badge-completed { background: #dcfce7; color: #166534; }

        .receivable-banner {

        .wood-btn-wrapper {

        #toastWrap {

<script>
/* ════════════════════════════════════════════════════════

════════════════════════════════════════════════════════ */
const firebaseConfig = { 
    apiKey: "AIzaSyDGdi03xiK44WzrK8082VjUPsIujQmN7_A", 
    authDomain: "yongjin-enterprise.firebaseapp.com",

    storageBucket: "yongjin-enterprise.firebasestorage.app", 
    messagingSenderId: "364016255378", 
    appId: "1:364016255378:web:387f6145265e0a567d814b" 
};

let db, auth; 
let USERS = []; 
let orders = []; 
let currentUser = null; 
let chosenUserId = null; 
let pinBuffer = ''; 
let selectedWoodStr = '목재를 선택하세요'; 
let notiPoller = null;

// 🛡️ P1: 중복 제출 방지 플래그 및 차등 잠금 정책
let isSubmitting = false; 
const LOCKOUT_MINUTES = 10; 

const WOODS_DATA = [
    ['무광PET/퍼펙트화이트', 'image_f06ce4.png', '#FDFCF8'], 
    ['유광하이그로시/화이트', 'image_f06ca6.png', '#FFFFFF'],
    ['전체코팅/미백', 'image_f068c3.png', '#F0F0F0'], 
    ['양면코팅/미백', 'image_f068c3.png', '#EAEAEA'],
    ['자작합판', 'image_f065fb.png', '#E5D2BA'], 
    ['무광PET/포그그레이', 'image_f065dc.png', '#D0D0D0'],
    ['유광하이그로시/화이트펄', 'image_f065bb.png', '#F5F5F5'], 
    ['전체코팅/블랙', 'image_f0659c.png', '#222222'],
    ['양면코팅/블랙', 'image_f0659c.png', '#333333'], 
    ['미송집성목', 'image_f0655e.png', '#DEB887'],
    ['무광PET/모노그레이', 'image_f06528.png', '#A0A0A0'], 
    ['유광하이그로시/연그레이', 'image_f0650a.png', '#C0C0C0'],
    ['전체코팅/연회색', 'image_f059c3.png', '#D3D3D3'], 
    ['양면코팅/연회색', 'image_f059c3.png', '#D3D3D3'],
    ['MDF', 'image_f05719.png', '#C4A484'], 
    ['무광PET/미스트그린', 'image_f056f7.png', '#B2D3C2'],
    ['유광하이그로시/블랙', 'image_f056d9.png', '#1A1A1A'], 
    ['전체코팅/화이트오크', 'image_f056bc.png', '#D7C4B0'],
    ['양면코팅/화이트오크', 'image_f056bc.png', '#D7C4B0'], 
    ['일반합판', 'image_f05699.png', '#D2B48C'],
    ['전체코팅/연월넛', 'image_f0567a.png', '#8B5A2B'], 
    ['양면코팅/연월넛', 'image_f0567a.png', '#8B5A2B']
];

const ROLE_TABS = { 
    sales: ['sales', 'history'], 
    accounting: ['accounting', 'receivables', 'history'], 
    factory: ['factory', 'history'], 
    admin: ['sales', 'accounting', 'receivables', 'factory', 'history'] 
};

const TAB_META = { 
    sales: {label:'영업', emoji:'📝'}, 
    accounting: {label:'회계', emoji:'💼'}, 
    receivables: {label:'채권', emoji:'💰'}, 
    factory: {label:'생산', emoji:'🏭'}, 
    history: {label:'현황', emoji:'📊'} 
};

/* 🛡️ P2: 감사 로그 (Audit Logs) 고도화 함수 */
async function logAction(action, orderId, details) {
    try {
        await db.collection('audit_logs').add({
            action: action,
            user: currentUser.name,
            role: currentUser.role,
            order_id: orderId,
            details: details,
            timestamp: Date.now()
        });
    } catch(e) { 
        console.warn('Audit log failed:', e); 
    }
}

/* ══════════════════════════════════════════════
   🔒 보안 시작 및 실시간 유저 동기화
══════════════════════════════════════════════ */
window.onload = async function() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) e.preventDefault();
    });

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore(); 
    auth = firebase.auth();

    try {
        await auth.signInAnonymously();
        await syncUsers();
    } catch (e) { 
        document.getElementById('roleGrid').innerHTML = "<p class='text-red-500 text-xs py-10'>서버 연결 오류</p>"; 
    }
};

async function syncUsers() {
    const snapshot = await db.collection('users').where('status', '==', 'active').get();
    USERS = snapshot.docs.map(doc => { 
        const d = doc.data(); 
        if(d.role === 'ccounting') d.role = 'accounting'; 
        return { id: doc.id, ...d }; 
    });
    
    const grid = document.getElementById('roleGrid');
    grid.innerHTML = USERS.map(u => `
        <button class="role-sel-btn" id="rsb-${u.id}" onclick="chooseUser('${u.id}')">
            ${u.name}
        </button>`).join('');
        
    if (chosenUserId) checkLockoutStatus();
}

function checkLockoutStatus() {
    const user = USERS.find(u => u.id === chosenUserId);
    if (!user) return false;

    const now = Date.now();
    const lockoutUntil = user.lockoutUntil || 0;

    if (lockoutUntil > now) {
        const remaining = Math.ceil((lockoutUntil - now) / 60000);
        document.getElementById('pinErr').textContent = `⚠️ 보안 잠금: ${remaining}분 후 재시도 가능`;
        document.getElementById('keypadArea').style.opacity = '0.2'; 
        document.getElementById('keypadArea').style.pointerEvents = 'none';
        document.getElementById('securityStatus').textContent = "LOCKED"; 
        return true;
    }
    
    document.getElementById('keypadArea').style.opacity = '1'; 
    document.getElementById('keypadArea').style.pointerEvents = 'auto';
    document.getElementById('securityStatus').textContent = "Security Active"; 
    return false;
}

function chooseUser(uid) { 
    chosenUserId = uid; 
    pinBuffer = ''; 
    updateDots(); 
    document.getElementById('pinErr').textContent = ''; 
    document.querySelectorAll('.role-sel-btn').forEach(b => b.classList.remove('chosen')); 
    document.getElementById('rsb-' + uid).classList.add('chosen'); 
    checkLockoutStatus(); 
}

function kp(digit) { 
    if (!chosenUserId || pinBuffer.length >= 4 || checkLockoutStatus()) return; 
    pinBuffer += digit; 
    updateDots(); 
    if (pinBuffer.length === 4) setTimeout(tryLogin, 150); 
}

function kpDel() { 
    pinBuffer = pinBuffer.slice(0, -1); 
    updateDots(); 
}

function updateDots() { 
    for (let i = 0; i < 4; i++) {
        document.getElementById('pd' + i).className = 'pin-dot' + (i < pinBuffer.length ? ' on' : ''); 
    }
}

async function tryLogin() {
    const user = USERS.find(u => u.id === chosenUserId);
    const attempts = (user.attempts || 0) + 1;
    const limit = user.role === 'admin' ? 5 : 3;

    if (pinBuffer === user.pin) {
        await db.collection('users').doc(user.id).update({ attempts: 0, lockoutUntil: 0 });
        currentUser = user; 
        
        await logAction('LOGIN_SUCCESS', 'SYSTEM', { method: 'PIN' });
        
        document.getElementById('loginOverlay').style.display = 'none'; 
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('displayUser').textContent = user.name; 
        
        initTabs(); 
        fetchOrders(); 
        checkNotiBanner(); 
        startNotiPoller();
    } else {
        if (attempts >= limit) {
            const unlockTime = Date.now() + (LOCKOUT_MINUTES * 60 * 1000);
            await db.collection('users').doc(user.id).update({ attempts: attempts, lockoutUntil: unlockTime });
            await syncUsers(); 
        } else {
            await db.collection('users').doc(user.id).update({ attempts: attempts });
            document.getElementById('pinErr').textContent = `❌ PIN 불일치 (${attempts}/${limit})`;
            pinBuffer = ''; 
            updateDots();
        }
    }
}

/* 🛡️ P2: 데이터 5중 유효성 검증 (타임존 에러 해결 방식 적용) */
function validateOrder() {
    const errors = [];
    const client = document.getElementById('clientName').value.trim();
    if (client.length < 2) errors.push('업체명은 2자 이상 입력해야 합니다.');
    if (selectedWoodStr === '목재를 선택하세요') errors.push('목재 종류를 선택해 주세요.');
    
    const w = parseInt(document.getElementById('width').value || 0);
    const h = parseInt(document.getElementById('height').value || 0);
    if (w < 100 || w > 3000) errors.push('가로 폭은 100~3000mm 범위여야 합니다.');
    if (h < 100 || h > 3000) errors.push('세로 길이는 100~3000mm 범위여야 합니다.');
    
    const q = parseInt(document.getElementById('qty').value || 0);
    if (q < 1 || q > 10000) errors.push('수량은 1~10,000 범위여야 합니다.');
    
    const dD = document.getElementById('dueDate').value;
    const pD = document.getElementById('payDate').value;
    if (!dD || !pD) {
        errors.push('출고일과 입금기한을 모두 지정해 주세요.');
    } else {
        // String 직접 비교 방식으로 타임존 오류 원천 차단
        const todayStr = new Date().toISOString().split('T')[0];
        if (dD < todayStr) errors.push('출고일(납기)은 오늘 또는 그 이후여야 합니다.');
        if (pD < dD) errors.push('입금기한은 출고일 이후여야 합니다.');
    }
    return errors.length > 0 ? errors : null;
}

/* 🛡️ P1 & P2: 중복 제출 방지 및 감사 로그 추가된 수주 전송 로직 */
async function handleReport() {
    // 1차 방어: 이미 제출 중이면 즉시 리턴
    if (isSubmitting) return; 
    
    // 2차 방어: 유효성 검증
    const errors = validateOrder();
    if (errors) {
        return alert('❌ 입력 오류:\n\n' + errors.join('\n'));
    }

    if (!confirm('서버로 수주를 전송하시겠습니까?')) return;

    // 3차 방어: 버튼 잠금 및 플래그 켜기
    isSubmitting = true;
    const btn = document.getElementById('btnSubmitOrder');
    btn.disabled = true; 
    btn.classList.add('opacity-50', 'cursor-not-allowed');
    btn.textContent = "서버 전송 중...";

    const newOrder = { 
        client: document.getElementById('clientName').value.trim(), 
        material: selectedWoodStr, 
        thickness: document.getElementById('thickness').value, 
        price: parseInt(document.getElementById('unitPrice').value || 0), 
        qty: parseInt(document.getElementById('qty').value || 0), 
        width: document.getElementById('width').value, 
        height: document.getElementById('height').value, 
        dueDate: document.getElementById('dueDate').value, 
        payDate: document.getElementById('payDate').value, 
        status: 'pending', 
        paymentStatus: 'unpaid', 
        rejectReason: '',
        reportedBy: currentUser.name, 
        createdAt: Date.now() 
    };

    try {
        const docRef = await db.collection('orders').add(newOrder);
        await logAction('ORDER_CREATED', docRef.id, { 
            client: newOrder.client, 
            material: newOrder.material, 
            qty: newOrder.qty, 
            price: newOrder.price 
        });
        
        alert('✅ 수주 보고 전송 완료!'); 
        fetchOrders();
        document.getElementById('clientName').value = '';
    } catch(e) {
        alert('전송 실패: ' + e.message);
    } finally {
        isSubmitting = false;
        btn.disabled = false; 
        btn.classList.remove('opacity-50', 'cursor-not-allowed');
        btn.textContent = "✅ 수주 데이터 전송";
    }
}

/* 🛡️ P4: 생산량 입력 정규식 검증 추가 */
async function addProgress(id) { 
    const o = orders.find(x => x.id === id); 
    const inputEl = document.getElementById('in-' + id);
    const inputVal = inputEl.value.trim();
    
    if (!/^\d+$/.test(inputVal)) {
        return alert('정수(숫자)만 입력 가능합니다. (소수점, 공백 불가)');
    }
    
    const val = parseInt(inputVal); 
    if (val <= 0) return alert('0보다 큰 수를 입력하세요.'); 
    if ((o.completedQty || 0) + val > o.qty) {
        return alert(`초과! 남은 수량: ${o.qty - (o.completedQty || 0)}장`); 
    }
    
    inputEl.value = ''; // 입력창 초기화
    
    const newQty = (o.completedQty || 0) + val; 
    const newStatus = newQty >= o.qty ? 'completed' : 'approved'; 
    
    await db.collection('orders').doc(id).update({ completedQty: newQty, status: newStatus }); 
    await logAction('FACTORY_PROGRESS', id, { added: val, total: newQty, status: newStatus }); 
    fetchOrders(); 
}

/* 🛡️ P3: 상태 전이 매트릭스 도입 */
async function updateStatus(id, s) { 
    const o = orders.find(x => x.id === id);
    
    // 상태 전이 제약 (State Machine)
    const validTransitions = {
        'pending':   ['approved', 'rejected'],
        'approved':  ['completed', 'rejected'],
        'completed': [],  // 완료 후 변경 불가
        'rejected':  []   // 거절 후 변경 불가
    };
    
    if (!validTransitions[o.status] || !validTransitions[o.status].includes(s)) {
        return alert(`❌ 상태 전이 오류: 이미 완료되거나 거절된 주문입니다. (${o.status} → ${s})`);
    }

    if(confirm('상태를 변경하시겠습니까?')) { 
        await db.collection('orders').doc(id).update({ status: s }); 
        await logAction('ORDER_STATUS_CHANGED', id, { old_status: o.status, new_status: s }); 
        fetchOrders(); 
    } 
}

async function rejectOrder(id) {
    const reason = prompt('거절 사유를 입력하세요:');
    if (!reason) return;
    
    const o = orders.find(x => x.id === id);
    if (o.status !== 'pending' && o.status !== 'approved') {
        return alert('❌ 거절할 수 없는 상태입니다.');
    }
    
    await db.collection('orders').doc(id).update({ 
        status: 'rejected', 
        rejectReason: reason 
    });
    await logAction('ORDER_REJECTED', id, { reason: reason });
    fetchOrders();
}

async function confirmPayment(id) {

}

async function pushNotification(targetRoles, type, message) {

            message, 
            created_at: Date.now(),

function showToast(type, icon, title, msg) {
    const id = 'toast-' + Date.now(); 
    const el = document.createElement('div'); 
    el.className = `toast ${type}`; 
    el.id = id;
    el.innerHTML = `
        <div class="toast-icon">${icon}</div>
        <div class="toast-body">
            <div class="toast-title">${title}</div>
            <div class="toast-msg">${msg}</div>
        </div>
        <button class="toast-close" onclick="dismissToast('${id}')">✕</button>`;
    document.getElementById('toastWrap').appendChild(el); 
    setTimeout(() => dismissToast(id), 5000);
}

function dismissToast(id) { 
    const el = document.getElementById(id); 
    if(el) { 
        el.classList.add('out'); 
        setTimeout(() => el.remove(), 300); 
    } 
}

}

function sendBrowserNoti(title, body) { 
    if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: 'favicon.png' }); 
    }
}

function checkNotiBanner() { 
    if ('Notification' in window && Notification.permission !== 'granted' && !localStorage.getItem('yj_noti_granted')) {
        document.getElementById('notiBanner').style.display = 'block'; 
    }
}

function startNotiPoller() {
    if(notiPoller || !db) return;
    notiPoller = db.collection('notifications')
        .where('read', '==', false)
        .onSnapshot(snap => {
            snap.docChanges().forEach(change => {
                if(change.type === 'added') {
                    const n = { id: change.doc.id, ...change.doc.data() };
                    if (n.target_roles.includes(currentUser.role)) {
                        showToast('noti-sales', '🔔', '신규 알림', n.message); 
                        sendBrowserNoti('용진기업', n.message);
                        db.collection('notifications').doc(n.id).update({read: true});
                    }
                }
            });
        }, error => {
            console.warn("알림 연결 중단. 5초 후 재시도합니다.", error);
            notiPoller = null; 
            setTimeout(startNotiPoller, 5000); 
        });
}

function logout() { 
    if(confirm('로그아웃 하시겠습니까?')) location.reload(); 
}
