<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>용진기업 통합 관리 시스템</title>
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@300;500;700;900&display=swap');
        
        /* 🛡️ 보안: 우클릭 및 드래그 방지 */
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #f1f5f9; margin: 0; padding: 0; 
            -webkit-user-select: none; user-select: none;
            -webkit-touch-callout: none;
        }
        input, textarea { -webkit-user-select: text; user-select: text; }

        /* 🪵 3D 목재 미리보기 판넬 */
        .preview-container { perspective: 800px; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .wood-plate {
            width: 120px; height: 80px;
            transform: rotateX(45deg) rotateZ(-15deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 20px 20px 30px rgba(0,0,0,0.15), -2px -2px 5px rgba(255,255,255,0.8);
            border-bottom: 6px solid rgba(0,0,0,0.2); border-right: 4px solid rgba(0,0,0,0.1);
            background-size: cover; background-position: top center; border-radius: 4px;
        }

        .active-role { background-color: #1e3a8a !important; color: white !important; transform: scale(1.02); }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #000000 100%); }
        
        #loginOverlay { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(160deg, #0f2554 0%, #1e3a8a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 340px; background: #fff; border-radius: 28px; padding: 28px 24px 24px; box-shadow: 0 24px 60px rgba(0,0,0,0.35); }
        .login-logo { text-align: center; font-size: 18px; font-weight: 900; color: #0f2554; }
        
        .role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; max-height: 240px; overflow-y: auto; padding: 4px; }
        .role-sel-btn { padding: 12px 4px; border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc; font-size: 12px; font-weight: 700; color: #475569; cursor: pointer; transition: all 0.15s; text-align: center; }
        .role-sel-btn.chosen { border-color: #1e3a8a; background: #1e3a8a; color: #fff; }

        .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 16px; }
        .pin-dot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid #cbd5e1; background: #f1f5f9; }
        .pin-dot.on { background: #1e3a8a; border-color: #1e3a8a; }
        
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .kp-btn { padding: 14px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 18px; font-weight: 700; }
        .kp-btn:active { transform: scale(0.92); background: #dbeafe; }
        
        .badge { display:inline-block; font-size:9px; font-weight:700; padding:2px 8px; border-radius:20px; }
        .badge-pending { background:#fef3c7; color:#92400e; }
        .badge-approved { background:#dbeafe; color:#1d4ed8; }
        .badge-completed { background:#dcfce7; color:#166534; }
        
        .wood-btn-wrapper { display: flex; flex-direction: column; align-items: center; padding: 0.5rem; background: white; border: 1px solid #e2e8f0; border-radius: 1rem; cursor: pointer; }
        .wood-btn-img { min-height: 70px; object-fit: cover; border-radius: 0.5rem; width: 100%; }
        #toastWrap { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9000; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: #1e293b; color: #fff; border-radius: 16px; padding: 14px 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false">

<div id="toastWrap"></div>

<div id="loginOverlay">
    <div class="login-card">
        <div class="login-logo text-center mb-1">YONGJIN <span>ENT.</span></div>
        <div class="text-center text-[10px] text-slate-400 font-bold mb-4">SECURITY LEVEL 7 ACTIVE</div>
        <div class="role-grid" id="roleGrid"><p class="col-span-2 text-center text-xs text-slate-300 py-10">데이터 로드 중...</p></div>
        <div class="pin-dots">
            <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
        </div>
        <div class="keypad">
            <button class="kp-btn" onclick="kp('1')">1</button><button class="kp-btn" onclick="kp('2')">2</button><button class="kp-btn" onclick="kp('3')">3</button>
            <button class="kp-btn" onclick="kp('4')">4</button><button class="kp-btn" onclick="kp('5')">5</button><button class="kp-btn" onclick="kp('6')">6</button>
            <button class="kp-btn" onclick="kp('7')">7</button><button class="kp-btn" onclick="kp('8')">8</button><button class="kp-btn" onclick="kp('9')">9</button>
            <div class="kp-btn invisible"></div><button class="kp-btn" onclick="kp('0')">0</button><button class="kp-btn" onclick="kpDel()">⌫</button>
        </div>
        <div id="pinErr" class="text-center text-[10px] text-red-500 mt-2 min-h-[15px]"></div>
    </div>
</div>

<div id="mainApp" class="hidden pb-24">
    <nav class="bg-white border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
        <div class="max-w-md mx-auto space-y-3">
            <div id="roleTabsWrap" class="grid gap-1"></div>
            <div class="flex items-center justify-between bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
                <h1 class="text-sm font-black text-slate-900 italic">YONGJIN ENT.</h1>
                <div class="flex items-center gap-2">
                    <span id="displayUser" class="text-xs font-black text-blue-700 underline"></span>
                    <button onclick="location.reload()" class="text-[9px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded-lg">로그아웃</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div id="section-sales" class="hidden space-y-6">
            <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border space-y-4">
                <h3 class="font-bold text-lg">📝 신규 수주 보고</h3>
                <input type="text" id="clientName" placeholder="업체명 및 현장명" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none">
                
                <button onclick="openWoodModal()" class="w-full py-4 border-2 border-slate-800 rounded-2xl font-bold bg-slate-50 transition-all active:scale-95">목재 종류 선택</button>
                
                <div id="selectedWoodCard" class="bg-white p-4 rounded-2xl border border-blue-200 flex items-center gap-4 relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                    <div id="woodThumbContainer" class="w-14 h-14 bg-slate-100 rounded-xl flex items-center justify-center overflow-hidden">
                        <img id="woodThumbImg" class="hidden w-full h-full object-cover">
                        <div id="woodThumbColor" class="hidden w-full h-full"></div>
                        <span id="woodThumbText" class="text-[10px] text-slate-400">이미지</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-sm" id="selectedWoodName">목재를 선택하세요</p>
                        <select id="thickness" class="mt-2 text-xs font-bold border rounded p-1"><option>15T</option><option selected>18T</option><option>24T</option></select>
                    </div>
                </div>

                <div class="preview-container bg-slate-50 rounded-3xl border border-dashed border-slate-200">
                    <div class="relative">
                        <div id="woodPlate" class="wood-plate bg-white"></div>
                        <div class="absolute -bottom-4 left-1/2 -translate-x-1/2 text-[10px] font-black text-blue-600 bg-white px-2 py-0.5 rounded-full border shadow-sm" id="labelWidth">0 mm</div>
                        <div class="absolute -right-12 top-1/2 -translate-y-1/2 text-[10px] font-black text-blue-600 bg-white px-2 py-0.5 rounded-full border shadow-sm rotate-90" id="labelLength">0 mm</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="width" oninput="updatePlateSize()" placeholder="가로 폭(mm)" class="w-full p-4 border rounded-2xl font-bold">
                    <input type="number" id="height" oninput="updatePlateSize()" placeholder="세로 길이(mm)" class="w-full p-4 border rounded-2xl font-bold">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="unitPrice" oninput="calculate()" placeholder="단가(원)" class="w-full p-4 border rounded-2xl font-bold">
                    <input type="number" id="qty" oninput="calculate()" value="100" class="w-full p-4 border rounded-2xl font-bold">
                </div>
                <div class="gradient-bg p-6 rounded-[2rem] text-white text-center shadow-xl">
                    <div class="text-[10px] opacity-70 mb-1">예상 합계 금액</div>
                    <div class="text-3xl font-black italic">₩ <span id="totalDisplay">0</span></div>
                </div>
                <button onclick="handleReport()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg active:scale-95 transition-transform">✅ 수주 데이터 전송</button>
            </section>
        </div>

        <div id="section-accounting" class="hidden space-y-6"><div id="accountingList" class="space-y-4"></div></div>
        <div id="section-factory" class="hidden space-y-6"><div id="productionList" class="space-y-4"></div></div>
        <div id="section-receivables" class="hidden space-y-6"><div id="receivableBannerWrap"></div><div id="receivablesList" class="space-y-4"></div></div>
        <div id="section-history" class="hidden space-y-6"><div id="dashBoard"></div><div id="historyList" class="space-y-3 mt-4 text-xs"></div></div>
    </main>
</div>

<div id="modalContainer"></div>

<script>
/* ⚙️ 시스템 설정 및 22종 목재 데이터 복구 */
const firebaseConfig = {
  apiKey: "AIzaSyDGdi03xiK44WzrK8082VjUPsIujQmN7_A",
  authDomain: "yongjin-enterprise.firebaseapp.com",
  projectId: "yongjin-enterprise",
  storageBucket: "yongjin-enterprise.firebasestorage.app",
  messagingSenderId: "364016255378",
  appId: "1:364016255378:web:387f6145265e0a567d814b"
};

let db, auth;
let USERS = []; let orders = [];
let currentUser = null; let chosenUserId = null; let pinBuffer = '';
let selectedWoodStr = '목재를 선택하세요';

const WOODS_DATA = [
    ['무광PET/퍼펙트화이트', 'image_f06ce4.png', '#FDFCF8'], ['유광하이그로시/화이트', 'image_f06ca6.png', '#FFFFFF'],
    ['전체코팅/미백', 'image_f068c3.png', '#F0F0F0'], ['양면코팅/미백', 'image_f068c3.png', '#EAEAEA'],
    ['자작합판', 'image_f065fb.png', '#E5D2BA'], ['무광PET/포그그레이', 'image_f065dc.png', '#D0D0D0'],
    ['유광하이그로시/화이트펄', 'image_f065bb.png', '#F5F5F5'], ['전체코팅/블랙', 'image_f0659c.png', '#222222'],
    ['양면코팅/블랙', 'image_f0659c.png', '#333333'], ['미송집성목', 'image_f0655e.png', '#DEB887'],
    ['무광PET/모노그레이', 'image_f06528.png', '#A0A0A0'], ['유광하이그로시/연그레이', 'image_f0650a.png', '#C0C0C0'],
    ['전체코팅/연회색', 'image_f059c3.png', '#D3D3D3'], ['양면코팅/연회색', 'image_f059c3.png', '#D3D3D3'],
    ['MDF', 'image_f05719.png', '#C4A484'], ['무광PET/미스트그린', 'image_f056f7.png', '#B2D3C2'],
    ['유광하이그로시/블랙', 'image_f056d9.png', '#1A1A1A'], ['전체코팅/화이트오크', 'image_f056bc.png', '#D7C4B0'],
    ['양면코팅/화이트오크', 'image_f056bc.png', '#D7C4B0'], ['일반합판', 'image_f05699.png', '#D2B48C'],
    ['전체코팅/연월넛', 'image_f0567a.png', '#8B5A2B'], ['양면코팅/연월넛', 'image_f0567a.png', '#8B5A2B']
];

const ROLE_TABS = {
    sales: ['sales', 'history'],
    accounting: ['accounting', 'receivables', 'history'],
    factory: ['factory', 'history'],
    admin: ['sales', 'accounting', 'receivables', 'factory', 'history']
};

const TAB_META = {
    sales: {label:'영업', emoji:'📝'}, accounting: {label:'회계', emoji:'💼'},
    receivables: {label:'채권', emoji:'💰'}, factory: {label:'생산', emoji:'🏭'},
    history: {label:'현황', emoji:'📊'}
};

/* 🚀 시스템 가동 */
window.onload = async function() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore(); auth = firebase.auth();
    try {
        await auth.signInAnonymously();
        const snapshot = await db.collection('users').where('status', '==', 'active').get();
        USERS = snapshot.docs.map(doc => {
            const d = doc.data(); if(d.role === 'ccounting') d.role = 'accounting';
            return { id: doc.id, ...d };
        });
        buildLoginUI();
    } catch (e) {
        document.getElementById('roleGrid').innerHTML = "<p class='text-red-500 text-xs col-span-2 text-center py-10'>서버 보안 통신 오류</p>";
    }
};

/* 🔒 로그인 로직 */
function buildLoginUI() {
    const grid = document.getElementById('roleGrid');
    grid.innerHTML = USERS.map(u => `<button class="role-sel-btn" id="rsb-${u.id}" onclick="chooseUser('${u.id}')">${u.name}</button>`).join('');
}

function chooseUser(uid) {
    chosenUserId = uid; pinBuffer = ''; updateDots();
    document.getElementById('pinErr').textContent = '';
    document.querySelectorAll('.role-sel-btn').forEach(b => b.classList.remove('chosen'));
    document.getElementById('rsb-' + uid).classList.add('chosen');
}

function kp(digit) {
    if (!chosenUserId) return;
    if (pinBuffer.length >= 4) return;
    pinBuffer += digit; updateDots();
    if (pinBuffer.length === 4) setTimeout(tryLogin, 150);
}

function kpDel() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }

function updateDots() {
    for (let i = 0; i < 4; i++) document.getElementById('pd' + i).className = 'pin-dot' + (i < pinBuffer.length ? ' on' : '');
}

async function tryLogin() {
    const user = USERS.find(u => u.id === chosenUserId);
    if (pinBuffer === user.pin) {
        currentUser = user;
        await db.collection('audit_logs').add({ action: 'LOGIN', user: user.name, timestamp: Date.now() });
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('displayUser').textContent = user.name;
        initTabs(); fetchOrders();
    } else {
        document.getElementById('pinErr').textContent = '❌ PIN 번호 오류';
        pinBuffer = ''; updateDots();
    }
}

/* 🏠 메인 탭 제어 */
function initTabs() {
    const tabs = ROLE_TABS[currentUser.role];
    const wrap = document.getElementById('roleTabsWrap');
    wrap.style.gridTemplateColumns = `repeat(${tabs.length}, 1fr)`;
    wrap.innerHTML = tabs.map(t => `<button onclick="switchTab('${t}')" id="role-${t}" class="py-2 text-[10px] font-bold bg-slate-100 rounded-lg">${TAB_META[t].emoji} ${TAB_META[t].label}</button>`).join('');
    switchTab(tabs[0]);
}

function switchTab(tabId) {
    document.querySelectorAll('#roleTabsWrap button').forEach(b => b.classList.remove('active-role'));
    const btn = document.getElementById('role-' + tabId); if(btn) btn.classList.add('active-role');
    ['sales', 'accounting', 'factory', 'receivables', 'history'].forEach(s => document.getElementById('section-' + s).classList.add('hidden'));
    document.getElementById('section-' + tabId).classList.remove('hidden');
    
    if(tabId === 'accounting') renderAccounting();
    else if(tabId === 'factory') renderFactory();
    else if(tabId === 'receivables') renderReceivables();
    else if(tabId === 'history') renderHistory();
}

/* 💼 비즈니스 로직 복구 */
async function fetchOrders() {
    const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
    orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    const currentTab = document.querySelector('.active-role').id.replace('role-', '');
    switchTab(currentTab);
}

function updatePlateSize() {
    const w = document.getElementById('width').value || 0;
    const h = document.getElementById('height').value || 0;
    document.getElementById('labelWidth').innerText = w + ' mm';
    document.getElementById('labelLength').innerText = h + ' mm';
    const plate = document.getElementById('woodPlate');
    if (w > 0 && h > 0) {
        plate.style.width = Math.min(200, 60 + (w / 15)) + 'px';
        plate.style.height = Math.min(150, 40 + (h / 15)) + 'px';
    }
    calculate();
}

function calculate() {
    const p = parseInt(document.getElementById('unitPrice').value || 0);
    const q = parseInt(document.getElementById('qty').value || 0);
    document.getElementById('totalDisplay').innerText = (p * q).toLocaleString();
}

async function handleReport() {
    const client = document.getElementById('clientName').value;
    const qty = parseInt(document.getElementById('qty').value || 0);
    const price = parseInt(document.getElementById('unitPrice').value || 0);
    if (!client || qty <= 0 || selectedWoodStr === '목재를 선택하세요') return alert('모든 정보를 입력하세요.');

    await db.collection('orders').add({
        client, material: selectedWoodStr, price, qty, completedQty: 0,
        width: document.getElementById('width').value, height: document.getElementById('height').value,
        status: 'pending', paymentStatus: 'unpaid', reportedBy: currentUser.name, createdAt: Date.now()
    });
    alert('수주 보고 완료!'); fetchOrders();
}

/* 📊 각 부서별 렌더링 (전체 복구) */
function renderAccounting() {
    const filtered = orders.filter(o => o.status === 'pending');
    document.getElementById('accountingList').innerHTML = filtered.map(o => `
        <div class="bg-white p-5 rounded-3xl border border-blue-200 mb-4 shadow-sm relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
            <p class="font-black text-lg pl-2">${o.client}</p>
            <p class="text-xs text-slate-500 pl-2">${o.material} / ₩${(o.price * o.qty).toLocaleString()}</p>
            <button onclick="updateStatus('${o.id}', 'approved')" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl font-bold">수주 승인</button>
        </div>`).join('') || '<p class="text-center py-20 text-slate-400">대기 수주 없음</p>';
}

function renderFactory() {
    const filtered = orders.filter(o => o.status === 'approved');
    document.getElementById('productionList').innerHTML = filtered.map(o => `
        <div class="bg-white p-5 rounded-3xl border shadow-sm border-l-4 border-l-orange-500 mb-4">
            <p class="font-black text-lg">${o.client}</p>
            <p class="text-xs text-slate-500 mb-2">${o.material} - ${o.qty}장</p>
            <button onclick="updateStatus('${o.id}', 'completed')" class="w-full py-3 bg-orange-500 text-white rounded-xl font-bold">생산 완료 보고</button>
        </div>`).join('') || '<p class="text-center py-20 text-slate-400">진행 중인 공정 없음</p>';
}

function renderReceivables() {
    const unpaid = orders.filter(o => o.status === 'completed' && o.paymentStatus === 'unpaid');
    const total = unpaid.reduce((s, o) => s + (o.price * o.qty), 0);
    document.getElementById('receivableBannerWrap').innerHTML = `<div class="receivable-banner"><div><div class="text-[10px] opacity-70">미수금</div><div class="text-xl font-black">₩ ${total.toLocaleString()}</div></div><div class="font-bold">${unpaid.length}건</div></div>`;
    document.getElementById('receivablesList').innerHTML = unpaid.map(o => `
        <div class="bg-amber-50 p-5 border border-amber-200 rounded-3xl mb-3 shadow-sm">
            <p class="font-black text-amber-900">${o.client}</p>
            <p class="text-sm font-black text-red-600 mt-1">₩${(o.price * o.qty).toLocaleString()}</p>
            <button onclick="confirmPayment('${o.id}')" class="w-full mt-4 py-3 bg-amber-500 text-white rounded-xl font-bold">입금 확인 완료</button>
        </div>`).join('') || '<p class="text-center py-20 text-slate-400">미수금 없음</p>';
}

function renderHistory() {
    let pS=0, aS=0, uS=0, cS=0;
    orders.forEach(o => {
        const t = o.price * o.qty;
        if(o.status==='pending') pS+=t; else if(o.status==='approved') aS+=t;
        else if(o.status==='completed' && o.paymentStatus==='unpaid') uS+=t; else if(o.status==='completed' && o.paymentStatus==='paid') cS+=t;
    });
    document.getElementById('dashBoard').innerHTML = `<div class="grid grid-cols-2 gap-2 mb-4 text-[10px]"><div class="bg-yellow-50 p-3 rounded-xl border border-yellow-100">⏳ 대기: ₩${pS.toLocaleString()}</div><div class="bg-blue-50 p-3 rounded-xl border border-blue-100">🏭 생산: ₩${aS.toLocaleString()}</div><div class="bg-red-50 p-3 rounded-xl border border-red-100">💰 미수: ₩${uS.toLocaleString()}</div><div class="bg-green-50 p-3 rounded-xl border border-green-100">✅ 완료: ₩${cS.toLocaleString()}</div></div>`;
    document.getElementById('historyList').innerHTML = orders.map(o => `<div class="bg-white p-3 border rounded-xl mb-2 text-[11px] flex justify-between items-center"><div><b>${o.client}</b><br><span class="text-slate-400">${o.material}</span></div><div class="text-right">₩${(o.price * o.qty).toLocaleString()}<br><span class="badge ${o.status==='pending'?'badge-pending':o.status==='approved'?'badge-approved':'badge-completed'}">${o.status}</span></div></div>`).join('');
}

async function updateStatus(id, s) { if(confirm('진행하시겠습니까?')) { await db.collection('orders').doc(id).update({ status: s }); fetchOrders(); } }
async function confirmPayment(id) { if(confirm('입금 완료 처리하시겠습니까?')) { await db.collection('orders').doc(id).update({ paymentStatus: 'paid' }); fetchOrders(); } }

/* 🪵 22종 목재 모달 로직 복구 */
function openWoodModal() {
    const items = WOODS_DATA.map(([name, img, color]) => `
        <div class="wood-btn-wrapper" onclick="selectWood('${name}','${img}','${color}')">
            <img src="${img}" onerror="this.style.backgroundColor='${color}';this.src='';" class="wood-btn-img">
            <span class="text-[10px] font-bold text-slate-700 mt-2">${name}</span>
        </div>`).join('');
    document.getElementById('modalContainer').innerHTML = `
        <div class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end justify-center">
            <div class="bg-white w-full max-w-md p-6 rounded-t-[2.5rem] h-[75vh] flex flex-col">
                <div class="flex justify-between items-center mb-6"><b>자재 상세 선택 (22종)</b><button onclick="closeWoodModal()" class="w-8 h-8 bg-slate-100 rounded-full">✕</button></div>
                <div class="flex-1 overflow-y-auto grid grid-cols-2 gap-3 pb-10">${items}</div>
            </div>
        </div>`;
}
function closeWoodModal() { document.getElementById('modalContainer').innerHTML = ''; }
function selectWood(name, img, color) {
    selectedWoodStr = name; document.getElementById('selectedWoodName').innerText = name;
    const thumbImg = document.getElementById('woodThumbImg'); thumbImg.src = img; thumbImg.classList.remove('hidden');
    document.getElementById('woodThumbText').classList.add('hidden');
    const plate = document.getElementById('woodPlate'); plate.style.backgroundImage = `url('${img}')`; plate.style.backgroundColor = color;
    closeWoodModal();
}

function exportExcel() {
    const rows = orders.map(o => [o.client, o.material, o.qty, o.price, o.price * o.qty, o.status]);
    const ws = XLSX.utils.aoa_to_sheet([['업체명', '목재', '수량', '단가', '합계', '상태'], ...rows]);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
    XLSX.writeFile(wb, `용진기업_현황.xlsx`);
}

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore(); auth = firebase.auth();
    try {
        await auth.signInAnonymously();
        const snapshot = await db.collection('users').where('status', '==', 'active').get();
        USERS = snapshot.docs.map(doc => {
            const d = doc.data(); if(d.role === 'ccounting') d.role = 'accounting';
            return { id: doc.id, ...d };
        });
        buildLoginUI();
    } catch (e) {
        document.getElementById('roleGrid').innerHTML = "<p class='text-red-500 text-xs col-span-2 text-center py-10'>서버 보안 통신 오류</p>";
    }
};

/* 🔒 로그인 로직 */
function buildLoginUI() {
    const grid = document.getElementById('roleGrid');
    grid.innerHTML = USERS.map(u => `<button class="role-sel-btn" id="rsb-${u.id}" onclick="chooseUser('${u.id}')">${u.name}</button>`).join('');
}

function chooseUser(uid) {
    chosenUserId = uid; pinBuffer = ''; updateDots();
    document.getElementById('pinErr').textContent = '';
    document.querySelectorAll('.role-sel-btn').forEach(b => b.classList.remove('chosen'));
    document.getElementById('rsb-' + uid).classList.add('chosen');
}

function kp(digit) {
    if (!chosenUserId) return;
    if (pinBuffer.length >= 4) return;
    pinBuffer += digit; updateDots();
    if (pinBuffer.length === 4) setTimeout(tryLogin, 150);
}

function kpDel() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }

function updateDots() {
    for (let i = 0; i < 4; i++) document.getElementById('pd' + i).className = 'pin-dot' + (i < pinBuffer.length ? ' on' : '');
}

async function tryLogin() {
    const user = USERS.find(u => u.id === chosenUserId);
    if (pinBuffer === user.pin) {
        currentUser = user;
        await db.collection('audit_logs').add({ action: 'LOGIN', user: user.name, timestamp: Date.now() });
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('displayUser').textContent = user.name;
        initTabs(); fetchOrders();
    } else {
        document.getElementById('pinErr').textContent = '❌ PIN 번호 오류';
        pinBuffer = ''; updateDots();
    }
}

/* 🏠 메인 탭 제어 */
function initTabs() {
    const tabs = ROLE_TABS[currentUser.role];
    const wrap = document.getElementById('roleTabsWrap');
    wrap.style.gridTemplateColumns = `repeat(${tabs.length}, 1fr)`;
    wrap.innerHTML = tabs.map(t => `<button onclick="switchTab('${t}')" id="role-${t}" class="py-2 text-[10px] font-bold bg-slate-100 rounded-lg">${TAB_META[t].emoji} ${TAB_META[t].label}</button>`).join('');
    switchTab(tabs[0]);
}

function switchTab(tabId) {
    document.querySelectorAll('#roleTabsWrap button').forEach(b => b.classList.remove('active-role'));
    const btn = document.getElementById('role-' + tabId); if(btn) btn.classList.add('active-role');
    ['sales', 'accounting', 'factory', 'receivables', 'history'].forEach(s => document.getElementById('section-' + s).classList.add('hidden'));
    document.getElementById('section-' + tabId).classList.remove('hidden');
    
    if(tabId === 'accounting') renderAccounting();
    else if(tabId === 'factory') renderFactory();
    else if(tabId === 'receivables') renderReceivables();
    else if(tabId === 'history') renderHistory();
}

async function fetchOrders() {
    const snapshot = await db.collection('orders').orderBy('createdAt', 'desc').get();
    orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    const currentTab = document.querySelector('.active-role').id.replace('role-', '');
    switchTab(currentTab);
}

    document.getElementById('labelWidth').innerText = w + ' mm';
    document.getElementById('labelLength').innerText = h + ' mm';
    const plate = document.getElementById('woodPlate');
    if (w > 0 && h > 0) {
        plate.style.width = Math.min(200, 60 + (w / 15)) + 'px';
        plate.style.height = Math.min(150, 40 + (h / 15)) + 'px';
    }
    calculate();
}

function calculate() {
    const p = parseInt(document.getElementById('unitPrice').value || 0);
    const q = parseInt(document.getElementById('qty').value || 0);
    document.getElementById('totalDisplay').innerText = (p * q).toLocaleString();
}

async function handleReport() {
    const client = document.getElementById('clientName').value;
    const qty = parseInt(document.getElementById('qty').value || 0);
    const price = parseInt(document.getElementById('unitPrice').value || 0);
    if (!client || qty <= 0 || selectedWoodStr === '목재를 선택하세요') return alert('모든 정보를 입력하세요.');

    await db.collection('orders').add({
        client, material: selectedWoodStr, price, qty, completedQty: 0,
        width: document.getElementById('width').value, height: document.getElementById('height').value,
        status: 'pending', paymentStatus: 'unpaid', reportedBy: currentUser.name, createdAt: Date.now()
    });
    alert('수주 보고 완료!'); fetchOrders();
}

/* 📊 각 부서별 렌더링 (전체 복구) */
function renderAccounting() {
    const filtered = orders.filter(o => o.status === 'pending');
    document.getElementById('accountingList').innerHTML = filtered.map(o => `
        <div class="bg-white p-5 rounded-3xl border border-blue-200 mb-4 shadow-sm relative overflow-hidden">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
            <p class="font-black text-lg pl-2">${o.client}</p>
            <p class="text-xs text-slate-500 pl-2">${o.material} / ₩${(o.price * o.qty).toLocaleString()}</p>
            <button onclick="updateStatus('${o.id}', 'approved')" class="w-full mt-4 py-3 bg-blue-600 text-white rounded-xl font-bold">수주 승인</button>
        </div>`).join('') || '<p class="text-center py-20 text-slate-400">대기 수주 없음</p>';
}

function renderFactory() {
    const filtered = orders.filter(o => o.status === 'approved');
    document.getElementById('productionList').innerHTML = filtered.map(o => `
        <div class="bg-white p-5 rounded-3xl border shadow-sm border-l-4 border-l-orange-500 mb-4">
            <p class="font-black text-lg">${o.client}</p>
            <p class="text-xs text-slate-500 mb-2">${o.material} - ${o.qty}장</p>
            <button onclick="updateStatus('${o.id}', 'completed')" class="w-full py-3 bg-orange-500 text-white rounded-xl font-bold">생산 완료 보고</button>
        </div>`).join('') || '<p class="text-center py-20 text-slate-400">진행 중인 공정 없음</p>';
}

function renderReceivables() {
    const unpaid = orders.filter(o => o.status === 'completed' && o.paymentStatus === 'unpaid');
    const total = unpaid.reduce((s, o) => s + (o.price * o.qty), 0);
    document.getElementById('receivableBannerWrap').innerHTML = `<div class="receivable-banner"><div><div class="text-[10px] opacity-70">미수금</div><div class="text-xl font-black">₩ ${total.toLocaleString()}</div></div><div class="font-bold">${unpaid.length}건</div></div>`;
    document.getElementById('receivablesList').innerHTML = unpaid.map(o => `
        <div class="bg-amber-50 p-5 border border-amber-200 rounded-3xl mb-3 shadow-sm">
            <p class="font-black text-amber-900">${o.client}</p>
            <p class="text-sm font-black text-red-600 mt-1">₩${(o.price * o.qty).toLocaleString()}</p>
            <button onclick="confirmPayment('${o.id}')" class="w-full mt-4 py-3 bg-amber-500 text-white rounded-xl font-bold">입금 확인 완료</button>
        </div>`).join('') || '<p class="text-center py-20 text-slate-400">미수금 없음</p>';
}

function renderHistory() {
    let pS=0, aS=0, uS=0, cS=0;
    orders.forEach(o => {
        const t = o.price * o.qty;
        if(o.status==='pending') pS+=t; else if(o.status==='approved') aS+=t;
        else if(o.status==='completed' && o.paymentStatus==='unpaid') uS+=t; else if(o.status==='completed' && o.paymentStatus==='paid') cS+=t;
    });
    document.getElementById('dashBoard').innerHTML = `<div class="grid grid-cols-2 gap-2 mb-4 text-[10px]"><div class="bg-yellow-50 p-3 rounded-xl border border-yellow-100">⏳ 대기: ₩${pS.toLocaleString()}</div><div class="bg-blue-50 p-3 rounded-xl border border-blue-100">🏭 생산: ₩${aS.toLocaleString()}</div><div class="bg-red-50 p-3 rounded-xl border border-red-100">💰 미수: ₩${uS.toLocaleString()}</div><div class="bg-green-50 p-3 rounded-xl border border-green-100">✅ 완료: ₩${cS.toLocaleString()}</div></div>`;
    document.getElementById('historyList').innerHTML = orders.map(o => `<div class="bg-white p-3 border rounded-xl mb-2 text-[11px] flex justify-between items-center"><div><b>${o.client}</b><br><span class="text-slate-400">${o.material}</span></div><div class="text-right">₩${(o.price * o.qty).toLocaleString()}<br><span class="badge ${o.status==='pending'?'badge-pending':o.status==='approved'?'badge-approved':'badge-completed'}">${o.status}</span></div></div>`).join('');
}

async function updateStatus(id, s) { if(confirm('진행하시겠습니까?')) { await db.collection('orders').doc(id).update({ status: s }); fetchOrders(); } }
async function confirmPayment(id) { if(confirm('입금 완료 처리하시겠습니까?')) { await db.collection('orders').doc(id).update({ paymentStatus: 'paid' }); fetchOrders(); } }

/* 🪵 22종 목재 모달 로직 복구 */
function openWoodModal() {
    const items = WOODS_DATA.map(([name, img, color]) => `
        <div class="wood-btn-wrapper" onclick="selectWood('${name}','${img}','${color}')">
            <img src="${img}" onerror="this.style.backgroundColor='${color}';this.src='';" class="wood-btn-img">
            <span class="text-[10px] font-bold text-slate-700 mt-2">${name}</span>
        </div>`).join('');
    document.getElementById('modalContainer').innerHTML = `
        <div class="fixed inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-end justify-center">
            <div class="bg-white w-full max-w-md p-6 rounded-t-[2.5rem] h-[75vh] flex flex-col">
                <div class="flex justify-between items-center mb-6"><b>자재 상세 선택 (22종)</b><button onclick="closeWoodModal()" class="w-8 h-8 bg-slate-100 rounded-full">✕</button></div>
                <div class="flex-1 overflow-y-auto grid grid-cols-2 gap-3 pb-10">${items}</div>
            </div>
        </div>`;
}
function closeWoodModal() { document.getElementById('modalContainer').innerHTML = ''; }
function selectWood(name, img, color) {
    selectedWoodStr = name; document.getElementById('selectedWoodName').innerText = name;
    const thumbImg = document.getElementById('woodThumbImg'); thumbImg.src = img; thumbImg.classList.remove('hidden');
    document.getElementById('woodThumbText').classList.add('hidden');
    const plate = document.getElementById('woodPlate'); plate.style.backgroundImage = `url('${img}')`; plate.style.backgroundColor = color;
    closeWoodModal();
}

function exportExcel() {
    const rows = orders.map(o => [o.client, o.material, o.qty, o.price, o.price * o.qty, o.status]);
    const ws = XLSX.utils.aoa_to_sheet([['업체명', '목재', '수량', '단가', '합계', '상태'], ...rows]);
    const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
    XLSX.writeFile(wb, `용진기업_현황.xlsx`);
}
</script>
