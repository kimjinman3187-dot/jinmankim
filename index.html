<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>용진기업 통합 관리 시스템</title>
    <meta name="theme-color" content="#1e3a8a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="용진기업">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@300;500;700;900&display=swap');
        
        /* 🛡️ 보안: 텍스트 선택 및 드래그 전면 차단 */
        body { 
            font-family: 'Inter', 'Noto Sans KR', sans-serif; 
            background-color: #f1f5f9; margin: 0; padding: 0; 
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            -webkit-touch-callout: none;
        }
        input, textarea { -webkit-user-select: text; user-select: text; }

        .active-role { background-color: #1e3a8a !important; color: white !important; transform: scale(1.02); }
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #000000 100%); }
        .preview-container { perspective: 800px; }
        .wood-plate {
            transform: rotateX(45deg) rotateZ(-15deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 20px 20px 30px rgba(0,0,0,0.15), -2px -2px 5px rgba(255,255,255,0.8);
            border-bottom: 6px solid rgba(0,0,0,0.2);
            border-right: 4px solid rgba(0,0,0,0.1);
            background-size: cover;
            background-position: top center;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .wood-btn-img { min-height: 70px; object-fit: cover; border-radius: 0.5rem; width: 100%; border: 1px solid #f1f5f9; }
        .wood-btn-wrapper { display: flex; flex-direction: column; align-items: center; padding: 0.5rem; background: white; border: 1px solid #e2e8f0; border-radius: 1rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); cursor: pointer; }
        
        #loginOverlay { position: fixed; inset: 0; z-index: 9999; background: linear-gradient(160deg, #0f2554 0%, #1e3a8a 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .login-card { width: 100%; max-width: 340px; background: #fff; border-radius: 28px; padding: 28px 24px 24px; box-shadow: 0 24px 60px rgba(0,0,0,0.35); }
        .login-logo { text-align: center; font-size: 18px; font-weight: 900; letter-spacing: -0.5px; color: #0f2554; margin-bottom: 4px; }
        .login-logo span { color: #c8922a; }
        
        /* 실시간 로드되는 직원 버튼 그리드 */
        .role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 20px; max-height: 220px; overflow-y: auto; padding: 4px; }
        .role-sel-btn { padding: 12px 4px; border: 2px solid #e2e8f0; border-radius: 12px; background: #f8fafc; font-size: 12px; font-weight: 700; color: #475569; cursor: pointer; transition: all 0.15s; text-align: center; }
        .role-sel-btn.chosen { border-color: #1e3a8a; background: #1e3a8a; color: #fff; }

        .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 16px; }
        .pin-dot { width: 13px; height: 13px; border-radius: 50%; border: 2px solid #cbd5e1; background: #f1f5f9; }
        .pin-dot.on { background: #1e3a8a; border-color: #1e3a8a; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .kp-btn { padding: 14px; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 18px; font-weight: 700; cursor: pointer; }
        .kp-btn:active { transform: scale(0.92); background: #dbeafe; }
        .pin-err { text-align: center; font-size: 11px; color: #dc2626; font-weight: 700; min-height: 18px; margin-top: 10px; }
        
        .badge { display:inline-block; font-size:9px; font-weight:700; padding:2px 8px; border-radius:20px; }
        .badge-pending { background:#fef3c7; color:#92400e; }
        .badge-approved { background:#dbeafe; color:#1d4ed8; }
        .badge-completed { background:#dcfce7; color:#166534; }
        .badge-paid { background:#d1fae5; color:#065f46; }
        .badge-unpaid { background:#fef9c3; color:#713f12; }
        .receivable-banner { background: linear-gradient(135deg, #7c3aed, #4338ca); border-radius: 20px; padding: 18px 20px; color: #fff; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        #toastWrap { position: fixed; top: 84px; left: 50%; transform: translateX(-50%); z-index: 9000; display: flex; flex-direction: column; gap: 8px; width: calc(100% - 32px); max-width: 448px; pointer-events: none; }
        .toast { background: #1e293b; color: #fff; border-radius: 16px; padding: 14px 18px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 12px; pointer-events: auto; }
    </style>
</head>
<body oncontextmenu="return false" onselectstart="return false">

<div id="notiBanner" class="hidden bg-yellow-50 border-b border-yellow-200 p-3 text-center text-xs font-bold text-yellow-800 cursor-pointer" onclick="requestNotificationPermission()">
    🔔 알림을 허용하여 실시간 현황을 받아보세요 (탭하여 허용)
</div>
<div id="toastWrap"></div>

<div id="loginOverlay">
    <div class="login-card">
        <div class="login-logo">YONGJIN <span>ENT.</span></div>
        <div class="text-center text-[10px] text-slate-400 font-bold mb-4">보안 7단계 가동 중</div>
        <div class="role-grid" id="roleGrid">
            <p class="col-span-2 text-center text-xs text-slate-300 py-10">보안 통신망 연결 중...</p>
        </div>
        <div class="pin-dots">
            <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
        </div>
        <div class="keypad">
            <button class="kp-btn" onclick="kp('1')">1</button><button class="kp-btn" onclick="kp('2')">2</button><button class="kp-btn" onclick="kp('3')">3</button>
            <button class="kp-btn" onclick="kp('4')">4</button><button class="kp-btn" onclick="kp('5')">5</button><button class="kp-btn" onclick="kp('6')">6</button>
            <button class="kp-btn" onclick="kp('7')">7</button><button class="kp-btn" onclick="kp('8')">8</button><button class="kp-btn" onclick="kp('9')">9</button>
            <div class="kp-btn invisible"></div><button class="kp-btn" onclick="kp('0')">0</button><button class="kp-btn" onclick="kpDel()">⌫</button>
        </div>
        <div class="pin-err" id="pinErr"></div>
    </div>
</div>

<div id="mainApp" class="hidden pb-24">
    <nav class="bg-white border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
        <div class="max-w-md mx-auto space-y-3">
            <div id="roleTabsWrap" class="grid gap-1"></div>
            <div class="flex items-center justify-between bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
                <h1 class="text-sm font-black text-slate-900 italic">YONGJIN ENT.</h1>
                <div class="flex items-center gap-2">
                    <span id="displayUser" class="text-xs font-black text-blue-700 underline"></span>
                    <button onclick="logout()" class="text-[9px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded-lg">로그아웃</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div id="section-sales" class="hidden space-y-6">
            <section class="bg-white p-6 rounded-[2.5rem] shadow-sm border space-y-4">
                <h3 class="font-bold text-lg">📝 신규 수주 보고</h3>
                <input type="text" id="clientName" placeholder="업체명 및 현장명" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none">
                <button onclick="openWoodModal()" class="w-full py-4 border-2 border-slate-800 rounded-2xl font-bold bg-slate-50">목재 종류 선택</button>
                <div id="selectedWoodCard" class="bg-white p-4 rounded-2xl border border-blue-200 flex items-center gap-4 relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-500"></div>
                    <div id="woodThumbContainer" class="w-14 h-14 bg-slate-100 rounded-xl flex items-center justify-center overflow-hidden">
                        <img id="woodThumbImg" class="hidden w-full h-full object-cover">
                        <div id="woodThumbColor" class="hidden w-full h-full"></div>
                        <span id="woodThumbText" class="text-[10px] text-slate-400">이미지</span>
                    </div>
                    <div class="flex-1">
                        <p class="font-bold text-sm" id="selectedWoodName">목재를 선택하세요</p>
                        <select id="thickness" class="mt-2 text-xs font-bold border rounded p-1"><option>15T</option><option selected>18T</option><option>24T</option></select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3"><input type="number" id="width" oninput="updatePlateSize()" placeholder="가로 폭" class="w-full p-4 border rounded-2xl"><input type="number" id="height" oninput="updatePlateSize()" placeholder="세로 길이" class="w-full p-4 border rounded-2xl"></div>
                <div class="grid grid-cols-2 gap-3"><input type="number" id="unitPrice" oninput="calculate()" placeholder="단가" class="w-full p-4 border rounded-2xl"><input type="number" id="qty" oninput="calculate()" value="100" class="w-full p-4 border rounded-2xl"></div>
                <div class="grid grid-cols-2 gap-3 text-xs bg-red-50 p-3 rounded-2xl border border-red-100">
                    <div><label class="font-bold text-red-600">출고일*</label><input type="date" id="dueDate" class="w-full p-2 rounded border"></div>
                    <div><label class="font-bold text-red-600">입금기한*</label><input type="date" id="payDate" class="w-full p-2 rounded border"></div>
                </div>
                <div class="gradient-bg p-6 rounded-[2rem] text-white text-center shadow-xl">
                    <p class="text-[10px] opacity-70">예상 총 합계</p>
                    <div class="text-3xl font-black italic">₩ <span id="totalDisplay">0</span></div>
                </div>
                <button onclick="handleReport()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-lg active:scale-95 transition-transform">✅ 수주 전송</button>
            </section>
        </div>
        
        <div id="section-accounting" class="hidden space-y-6">
            <section class="bg-white rounded-[2.5rem] p-6 shadow-sm border-2 border-blue-100">
                <h3 class="font-bold text-blue-800 mb-4 flex items-center gap-2"><span class="bg-blue-100 p-1.5 rounded-lg">💼</span> 신규 승인 대기</h3>
                <div id="accountingList" class="space-y-4 mb-6">로딩중...</div>
                <div class="border-t border-dashed border-gray-200 pt-6 mb-6">
                    <h3 class="font-bold text-orange-600 mb-4 text-sm flex items-center gap-2"><span class="bg-orange-100 p-1.5 rounded-lg">🏭</span> 공장 생산 현황</h3>
                    <div id="accountingFactoryList" class="space-y-3">로딩중...</div>
                </div>
                <div class="border-t border-dashed border-gray-200 pt-6">
                    <h3 class="font-bold text-slate-600 mb-4 text-sm flex items-center gap-2"><span class="bg-slate-100 p-1.5 rounded-lg">🧾</span> 청구 대기 (계산서)</h3>
                    <div id="accountingCompletedList" class="space-y-3">로딩중...</div>
                </div>
            </section>
        </div>

        <div id="section-receivables" class="hidden space-y-6">
            <div id="receivableBannerWrap"></div>
            <section class="bg-white rounded-[2.5rem] p-6 shadow-sm border-2 border-amber-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-amber-700">💰 채권관리 (미수금)</h3>
                    <button onclick="exportReceivablesCSV()" class="text-[10px] bg-green-600 text-white px-3 py-2 rounded-lg font-bold">📊 엑셀 저장</button>
                </div>
                <div id="receivablesList" class="space-y-4">로딩중...</div>
            </section>
        </div>

        <div id="section-factory" class="hidden space-y-6">
            <section class="bg-white rounded-[2.5rem] p-6 shadow-sm border-2 border-orange-100">
                <h3 class="font-bold text-orange-800 mb-6">🏭 생산 공정 제어판</h3>
                <div id="productionList" class="space-y-6">로딩중...</div>
            </section>
        </div>

        <div id="section-history" class="hidden space-y-6">
            <section class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-bold text-slate-800">📊 통합 대시보드</h3>
                    <div class="flex gap-2">
                        <button onclick="exportExcel()" class="text-[10px] bg-green-600 text-white px-3 py-2 rounded-lg font-bold">📊 엑셀 저장</button>
                        <button onclick="clearAllData()" class="text-[10px] bg-red-100 text-red-600 px-3 py-2 rounded-lg font-bold" id="clearBtn" style="display:none;">🗑 초기화</button>
                    </div>
                </div>
                <div id="dashBoard">로딩중...</div>
                <div id="historyList" class="space-y-3 mt-4 text-xs"></div>
            </section>
        </div>
    </main>
</div>

<div id="modalContainer"></div>

<script>
/* ⚙️ 시스템 초기화 및 보안 설정 */
const firebaseConfig = {
  apiKey: "AIzaSyDGdi03xiK44WzrK8082VjUPsIujQmN7_A",
  authDomain: "yongjin-enterprise.firebaseapp.com",
  projectId: "yongjin-enterprise",
  storageBucket: "yongjin-enterprise.firebasestorage.app",
  messagingSenderId: "364016255378",
  appId: "1:364016255378:web:387f6145265e0a567d814b"
};

let db, auth;
let USERS = []; // 🛡️ 보안: 코드 내 PIN 제거 (DB 실시간 동기화)
let orders = [];
let selectedWoodStr = '목재를 선택하세요';
let currentUser = null;
let chosenUserId = null;
let pinBuffer = '';
let notiPoller = null;

const ROLE_TABS = {
    sales:      ['sales',       'history'],
    accounting: ['accounting',  'receivables', 'history'],
    factory:    ['factory',     'history'],
    admin:      ['sales', 'accounting', 'receivables', 'factory', 'history'],
};

const TAB_META = {
    sales:       { label: '영업',  emoji: '📝' },
    accounting:  { label: '회계',  emoji: '💼' },
    receivables: { label: '채권',  emoji: '💰' },
    factory:     { label: '생산',  emoji: '🏭' },
    history:     { label: '현황',  emoji: '📊' },
};

/* 🚀 시스템 가동 로직 */
window.onload = async function() {
    applySecurityLock();
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    auth = firebase.auth();
    
    try {
        await auth.signInAnonymously();
        console.log("보안 터널 가동");
        await syncEmployeeData();
    } catch (e) {
        document.getElementById('roleGrid').innerHTML = "<p class='text-red-500 text-xs col-span-2 text-center'>서버 보안 통신 오류</p>";
    }
};

/* 🛡️ 보안: 우클릭, 드래그, 개발자 도구 차단 */
function applySecurityLock() {
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault();
        }
    });
}

/* 🛡️ 파이어베이스 users 컬렉션에서 활성 직원 전원 로드 */
async function syncEmployeeData() {
    try {
        const snapshot = await db.collection('users').where('status', '==', 'active').get();
        USERS = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        buildLoginUI();
    } catch (e) { console.error("Data Sync Error:", e); }
}

function buildLoginUI() {
    const grid = document.getElementById('roleGrid');
    if (!grid) return;
    grid.innerHTML = USERS.map(u => `
        <button class="role-sel-btn" id="rsb-${u.id}" onclick="chooseUser('${u.id}')">${u.name}</button>
    `).join('');
}

function chooseUser(uid) {
    chosenUserId = uid; pinBuffer = ''; updateDots();
    document.getElementById('pinErr').textContent = '';
    document.querySelectorAll('.role-sel-btn').forEach(b => b.classList.remove('chosen'));
    document.getElementById('rsb-' + uid).classList.add('chosen');
}

function kp(digit) {
    if (!chosenUserId) { document.getElementById('pinErr').textContent = '직원을 먼저 선택하세요'; return; }
    if (pinBuffer.length >= 4) return;
    pinBuffer += digit; updateDots();
    if (pinBuffer.length === 4) setTimeout(tryLogin, 120);
}

function kpDel() { pinBuffer = pinBuffer.slice(0, -1); updateDots(); }

function updateDots() {
    for (let i = 0; i < 4; i++) {
        document.getElementById('pd' + i).className = 'pin-dot' + (i < pinBuffer.length ? ' on' : '');
    }
}

async function tryLogin() {
    const user = USERS.find(u => u.id === chosenUserId);
    if (pinBuffer === user.pin) {
        currentUser = user;
        
        // 🛡️ [감사 로그] 로그인 성공 기록
        await db.collection('audit_logs').add({
            action: 'LOGIN_SUCCESS',
            user: user.name,
            role: user.role,
            timestamp: Date.now()
        });

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('displayUser').textContent = user.name;
        if (user.role === 'admin') document.getElementById('clearBtn').style.display = '';

        buildTabs();
        switchRole(ROLE_TABS[user.role][0]);
        fetchOrdersFromCloud();
        checkNotiBanner();
        startNotiPoller();
    } else {
        document.getElementById('pinErr').textContent = '❌ PIN 번호 오류';
        pinBuffer = ''; updateDots();
    }
}

/* ══ 부서별 탭 전환 ══ */
function buildTabs() {
    const tabs = ROLE_TABS[currentUser.role];
    const wrap = document.getElementById('roleTabsWrap');
    wrap.style.gridTemplateColumns = `repeat(${tabs.length}, 1fr)`;
    wrap.innerHTML = tabs.map(t => `
        <button onclick="switchRole('${t}')" id="role-${t}" class="py-2 text-[9px] font-bold bg-slate-100 rounded-lg">
            ${TAB_META[t].emoji} ${TAB_META[t].label}
        </button>`).join('');
}

function switchRole(role) {
    const allTabs = ['sales', 'accounting', 'receivables', 'factory', 'history'];
    allTabs.forEach(r => {
        const sec = document.getElementById('section-' + r);
        const btn = document.getElementById('role-' + r);
        if (sec) sec.classList.add('hidden');
        if (btn) btn.classList.remove('active-role');
    });
    const sec = document.getElementById('section-' + role);
    const btn = document.getElementById('role-' + role);
    if (sec) sec.classList.remove('hidden');
    if (btn) btn.classList.add('active-role');

    if (role === 'accounting') renderAccounting();
    else if (role === 'factory') renderFactory();
    else if (role === 'receivables') renderReceivables();
    else if (role === 'history') renderHistory();
}

/* ══ 비즈니스 로직 (v1.3 기능 유지) ══ */
async function fetchOrdersFromCloud() {
    if (!db) return;
    try {
        const snapshot = await db.collection('orders').orderBy('createdAt', 'asc').get();
        orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const activeBtn = document.querySelector('.active-role');
        if (activeBtn) switchRole(activeBtn.id.replace('role-', ''));
    } catch (e) { console.error("로드 실패:", e); }
}

async function updateOrderInCloud(id, updates) {
    if(!db) return;
    try {
        await db.collection('orders').doc(id).update(updates);
        fetchOrdersFromCloud();
    } catch (e) { alert('오류: ' + e.message); }
}

function calculate() {
    const p = parseFloat(document.getElementById('unitPrice').value) || 0;
    const q = parseInt(document.getElementById('qty').value) || 0;
    document.getElementById('totalDisplay').innerText = (p * q).toLocaleString();
}

async function handleReport() {
    const client = document.getElementById('clientName').value;
    const t = document.getElementById('thickness').value;
    const qty = parseInt(document.getElementById('qty').value || 0);
    const price = parseInt(document.getElementById('unitPrice').value || 0);
    const w = document.getElementById('width').value || 0;
    const h = document.getElementById('height').value || 0;
    const dueDate = document.getElementById('dueDate').value;
    const payDate = document.getElementById('payDate').value;

    if (!client || qty <= 0 || price <= 0 || selectedWoodStr === '목재를 선택하세요') return alert('항목을 확인하세요.');
    if (!confirm('수주를 전송하시겠습니까?')) return;

    const newOrder = {
        client, material: selectedWoodStr, thickness: t, width: w, height: h, price, qty, completedQty: 0,
        dueDate, payDate, status: 'pending', paymentStatus: 'unpaid',
        reportedBy: currentUser.name, createdAt: Date.now()
    };
    await db.collection('orders').add(newOrder);
    alert('서버 저장 완료!');
    document.getElementById('clientName').value = '';
    fetchOrdersFromCloud();
}

/* ════ 회계 렌더링 ════ */
function renderAccounting() {
    document.getElementById('accountingList').innerHTML = orders.filter(o => o.status === 'pending').map(o => `
        <div class="bg-white p-5 rounded-3xl border border-blue-200 mb-4 shadow-sm relative overflow-hidden">
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
            <p class="font-black text-lg pl-2">${o.client}</p>
            <div class="text-xs text-slate-600 bg-slate-50 p-3 rounded-xl mb-3 ml-2">
                <p>• 자재: <b>${o.material} (${o.thickness})</b></p>
                <p>• 금액: <b>₩${(o.price * o.qty).toLocaleString()}</b></p>
            </div>
            <div class="flex gap-2 ml-2">
                <button onclick="updateStatus('${o.id}', 'approved')" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">승인</button>
            </div>
        </div>`).join('') || '<p class="text-center py-4 text-xs text-slate-400">대기 중인 수주 없음</p>';
    
    // 공장 현황 및 청구 리스트 로직 (생략 - 기존 원본 유지)
}

async function updateStatus(id, s) {
    await updateOrderInCloud(id, { status: s });
    showToast('noti-success', '✅', '처리 완료', '상태가 변경되었습니다.');
}

/* ════ 생산 렌더링 ════ */
function renderFactory() {
    document.getElementById('productionList').innerHTML = orders.filter(o => o.status === 'approved').map(o => {
        const pct = Math.round(((o.completedQty || 0) / o.qty) * 100);
        return `
        <div class="bg-white p-5 rounded-3xl border shadow-sm mb-4 border-l-4 border-l-orange-500">
            <p class="font-black text-lg">${o.client}</p>
            <p class="text-xs text-slate-500 mb-3">${o.material} (${o.qty}장) — 완료 ${o.completedQty || 0}장</p>
            <div class="w-full bg-slate-200 h-2 rounded-full overflow-hidden mb-4">
                <div class="bg-orange-500 h-full rounded-full" style="width:${pct}%"></div>
            </div>
            <div class="flex gap-2">
                <input type="number" id="in-${o.id}" class="flex-1 p-3 bg-slate-50 rounded-xl border" placeholder="수량 입력">
                <button onclick="addProgress('${o.id}')" class="px-6 py-3 bg-orange-600 text-white rounded-xl font-bold">보고</button>
            </div>
        </div>`;
    }).join('') || '<p class="text-center py-10 text-slate-400 text-xs">생산 중인 수주 없음</p>';
}

async function addProgress(id) {
    const o = orders.find(x => x.id === id);
    const val = parseInt(document.getElementById('in-' + id).value || 0);
    if (val <= 0) return alert('수량을 입력하세요.');
    const newQty = (o.completedQty || 0) + val;
    const newStatus = newQty >= o.qty ? 'completed' : o.status;
    await updateOrderInCloud(id, { completedQty: newQty, status: newStatus });
}

/* ════ 채권 및 현황 렌더링 ════ */
function renderReceivables() {
    const unpaid = orders.filter(o => o.status === 'completed' && o.paymentStatus === 'unpaid');
    const total = unpaid.reduce((s, o) => s + (o.price * o.qty), 0);
    document.getElementById('receivableBannerWrap').innerHTML = `
        <div class="receivable-banner">
            <div><div class="text-[10px] opacity-70">총 미수금액</div><div class="text-xl font-black">₩ ${total.toLocaleString()}</div></div>
            <div class="rb-count">${unpaid.length}건</div>
        </div>`;
    document.getElementById('receivablesList').innerHTML = unpaid.map(o => `
        <div class="p-5 rounded-3xl border border-amber-200 bg-amber-50 mb-3 shadow-sm">
            <p class="font-black text-amber-900">${o.client}</p>
            <p class="text-sm font-black text-red-600 mt-2">청구액: ₩${(o.price * o.qty).toLocaleString()}</p>
            <button onclick="confirmPayment('${o.id}')" class="w-full py-3 mt-4 bg-amber-500 text-white rounded-xl font-bold">💵 입금 확인</button>
        </div>`).join('') || '<p class="text-center py-10 text-slate-400 text-xs">미수금 없음 🎉</p>';
}

async function confirmPayment(id) {
    if (confirm('입금 완료 처리하시겠습니까?')) await updateOrderInCloud(id, { paymentStatus: 'paid' });
}

function renderHistory() {
    let pC=0,pS=0, aC=0,aS=0, uC=0,uS=0, cC=0,cS=0;
    orders.forEach(o => {
        const tot = (o.price||0) * (o.qty||0);
        if (o.status === 'pending') { pC++; pS+=tot; }
        else if (o.status === 'approved') { aC++; aS+=tot; }
        else if (o.status === 'completed' && o.paymentStatus === 'unpaid') { uC++; uS+=tot; }
        else if (o.status === 'completed' && o.paymentStatus === 'paid') { cC++; cS+=tot; }
    });
    document.getElementById('dashBoard').innerHTML = `
        <div class="grid grid-cols-2 gap-2 mb-2 text-[10px]">
            <div class="bg-yellow-50 p-3 rounded-xl border border-yellow-200">⏳ 대기: ₩${pS.toLocaleString()}</div>
            <div class="bg-blue-50 p-3 rounded-xl border border-blue-200">🏭 생산: ₩${aS.toLocaleString()}</div>
            <div class="bg-red-50 p-3 rounded-xl border border-red-200">💰 미수: ₩${uS.toLocaleString()}</div>
            <div class="bg-green-50 p-3 rounded-xl border border-green-200">✅ 완료: ₩${cS.toLocaleString()}</div>
        </div>`;
    document.getElementById('historyList').innerHTML = [...orders].reverse().map(o => `
        <div class="bg-white p-3 rounded-xl border mb-2">
            <div class="flex justify-between"><b>${o.client}</b> <span class="badge badge-completed">${o.status}</span></div>
            <div class="text-[10px] text-slate-500">${o.material} / ₩${(o.price * o.qty).toLocaleString()}</div>
        </div>`).join('');
}

/* ══ 목재 모달 (기존 원본 로직) ══ */
function openWoodModal() {
    const woods = [
        ['무광PET/퍼펙트화이트', 'image_f06ce4.png', '#FDFCF8'], ['유광하이그로시/화이트', 'image_f06ca6.png', '#FFFFFF'],
        ['전체코팅/미백', 'image_f068c3.png', '#F0F0F0'], ['자작합판', 'image_f065fb.png', '#E5D2BA']
    ];
    const items = woods.map(([name, img, color]) => `
        <div class="wood-btn-wrapper" onclick="selectWood('${name}','${img}','${color}')">
            <img src="${img}" onerror="this.style.backgroundColor='${color}';this.src='';" class="wood-btn-img">
            <span class="text-[10px] font-bold mt-2">${name}</span>
        </div>`).join('');
    document.getElementById('modalContainer').innerHTML = `
        <div class="fixed inset-0 z-[100] bg-black/70 flex items-end justify-center">
            <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 h-[70vh] flex flex-col">
                <div class="flex justify-between items-center mb-4"><b>자재 선택</b><button onclick="closeWoodModal()">✕</button></div>
                <div class="flex-1 overflow-y-auto grid grid-cols-2 gap-3">${items}</div>
            </div>
        </div>`;
}
function closeWoodModal() { document.getElementById('modalContainer').innerHTML = ''; }
function selectWood(name, img, color) {
    selectedWoodStr = name; document.getElementById('selectedWoodName').innerText = name;
    document.getElementById('woodThumbImg').src = img; document.getElementById('woodThumbImg').classList.remove('hidden');
    closeWoodModal();
}

/* ══ 알림 및 기타 ══ */
function showToast(type, icon, title, msg) {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<div>${icon}</div><div><b>${title}</b><br>${msg}</div>`;
    document.getElementById('toastWrap').appendChild(el);
    setTimeout(() => el.remove(), 4000);
}
